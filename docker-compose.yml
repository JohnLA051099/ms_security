version: '3'

services:
  ms-security:
    build: ms-security
    mem_limit: 512m
    ports:
      - "8080:8080"
    environment:
      DB_HOST: ms_secur
      DB_URL: jdbc:mysql://ms_secur:3306/ms-security?createDatabaseIfNotExist=true&serverTimezone=UTC
      DB_USER_NAME: root
      DB_PASSWORD: 123456789
    restart: always
    depends_on:
      ms_secur:
          condition: service_healthy
  ms_secur:
    image: mysql:8.0.33 
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456789
      MYSQL_PASSWORD: 123456789
      MYSQL_DATABASE: ms-security
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 10s
      retries: 10